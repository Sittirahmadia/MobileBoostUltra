name: Build MobileBoost ULTRA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.8"

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sSL "https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          wget -q "https://services.gradle.org/distributions/gradle-8.8-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar || \
          gradle wrapper --gradle-version=8.8

      - name: Cache Gradle & Loom caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build mod with Gradle
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g -Xms512m"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobileboost-ultra-1.21.11
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Show build output
        run: ls -lh build/libs/
